name: Update Instagram Avatar

on:
  schedule:
    - cron: "0 14 * * *" # Daily at 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-avatar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update avatar from Instagram
        run: node scripts/update_instagram_avatar.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/avatar.jpg assets/avatar-meta.json
          git diff --cached --quiet || git commit -m "chore: update instagram avatar"
          git push
